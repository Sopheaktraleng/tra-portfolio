<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Data EF open data portal</title>
  <desc id="description">An illustrated portal interface showing dataset search, data sources, downloads, and real-time APIs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#082f49"/>
      <stop offset="0.55" stop-color="#075985"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#020617" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="48" fill="url(#bg)"/>
  <circle cx="1410" cy="70" r="290" fill="#22d3ee" opacity="0.08"/>
  <circle cx="120" cy="850" r="330" fill="#34d399" opacity="0.08"/>

  <g font-family="system-ui, sans-serif">
    <g transform="translate(100 78)">
      <rect width="70" height="70" rx="20" fill="url(#accent)"/>
      <path d="M19 48V31m16 17V20m16 28V27" stroke="#042f2e" stroke-width="8" stroke-linecap="round"/>
      <text x="92" y="47" fill="#f8fafc" font-size="42" font-weight="760">Data EF</text>
      <text x="1210" y="43" fill="#bae6fd" font-size="21" text-anchor="end">OPEN DATA PORTAL</text>
    </g>

    <text x="100" y="255" fill="#f8fafc" font-size="66" font-weight="780">Explore trusted public data</text>
    <text x="102" y="312" fill="#bae6fd" font-size="28">Economic and financial datasets, sources, collections, and real-time APIs.</text>

    <g filter="url(#shadow)">
      <rect x="100" y="365" width="1400" height="420" rx="34" fill="#f8fafc"/>
      <rect x="150" y="415" width="1300" height="82" rx="20" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
      <circle cx="200" cy="456" r="17" fill="none" stroke="#0e7490" stroke-width="6"/>
      <path d="m212 469 16 16" stroke="#0e7490" stroke-width="6" stroke-linecap="round"/>
      <text x="252" y="468" fill="#64748b" font-size="25">Search datasets, institutions, formats, and APIs</text>
      <rect x="1260" y="429" width="165" height="54" rx="16" fill="url(#accent)"/>
      <text x="1342" y="464" fill="#083344" font-size="21" font-weight="700" text-anchor="middle">Explore data</text>

      <g transform="translate(150 545)">
        <rect width="285" height="185" rx="24" fill="#ecfeff" stroke="#a5f3fc" stroke-width="3"/>
        <circle cx="52" cy="50" r="25" fill="#06b6d4"/>
        <path d="M40 50h24M52 38v24" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <text x="28" y="103" fill="#0f172a" font-size="24" font-weight="730">Datasets</text>
        <text x="28" y="137" fill="#64748b" font-size="18">Search and download</text>
        <text x="28" y="165" fill="#64748b" font-size="18">trusted public records</text>
      </g>
      <g transform="translate(470 545)">
        <rect width="285" height="185" rx="24" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="3"/>
        <circle cx="52" cy="50" r="25" fill="#10b981"/>
        <path d="M38 56h28M43 47h18M48 38h8" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <text x="28" y="103" fill="#0f172a" font-size="24" font-weight="730">Collections</text>
        <text x="28" y="137" fill="#64748b" font-size="18">Related publications</text>
        <text x="28" y="165" fill="#64748b" font-size="18">grouped by purpose</text>
      </g>
      <g transform="translate(790 545)">
        <rect width="285" height="185" rx="24" fill="#eff6ff" stroke="#bfdbfe" stroke-width="3"/>
        <circle cx="52" cy="50" r="25" fill="#3b82f6"/>
        <path d="M37 50h30M52 35v30" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        <text x="28" y="103" fill="#0f172a" font-size="24" font-weight="730">Data sources</text>
        <text x="28" y="137" fill="#64748b" font-size="18">Government and</text>
        <text x="28" y="165" fill="#64748b" font-size="18">institutional publishers</text>
      </g>
      <g transform="translate(1110 545)">
        <rect width="285" height="185" rx="24" fill="#faf5ff" stroke="#e9d5ff" stroke-width="3"/>
        <circle cx="52" cy="50" r="25" fill="#a855f7"/>
        <path d="m38 49 10 10 19-21" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="103" fill="#0f172a" font-size="24" font-weight="730">Real-time APIs</text>
        <text x="28" y="137" fill="#64748b" font-size="18">Current information</text>
        <text x="28" y="165" fill="#64748b" font-size="18">for connected systems</text>
      </g>
    </g>
  </g>
</svg>
