<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">GitOps Kubernetes delivery pipeline</title>
  <desc id="description">A stylized workflow connecting GitLab, continuous integration, Argo CD, Kubernetes, and AWS monitoring.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#312e81"/>
      <stop offset="1" stop-color="#701a75"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#f9a8d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c4b5fd"/>
    </marker>
  </defs>
  <rect width="1600" height="900" rx="48" fill="url(#background)"/>
  <circle cx="1410" cy="120" r="250" fill="#ec4899" opacity="0.12"/>
  <circle cx="180" cy="820" r="300" fill="#22d3ee" opacity="0.1"/>
  <g opacity="0.12" stroke="#fff">
    <path d="M0 150h1600M0 300h1600M0 450h1600M0 600h1600M0 750h1600"/>
    <path d="M200 0v900M400 0v900M600 0v900M800 0v900M1000 0v900M1200 0v900M1400 0v900"/>
  </g>
  <text x="110" y="135" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="58" font-weight="750">GitOps delivery pipeline</text>
  <text x="112" y="188" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="26">Versioned changes flow into a reconciled Kubernetes environment.</text>
  <path d="M310 480H1290" fill="none" stroke="url(#line)" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)" font-family="system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(210 480)">
      <rect x="-120" y="-105" width="240" height="210" rx="30" fill="#fff" fill-opacity="0.96" stroke="#67e8f9" stroke-width="5"/>
      <path d="M-34-36 0-60l34 24v42L0 30-34 6z" fill="#fc6d26"/>
      <text y="67" fill="#111827" font-size="28" font-weight="700">GitLab</text>
      <text y="94" fill="#475569" font-size="17">source + desired state</text>
    </g>
    <g transform="translate(505 480)">
      <rect x="-120" y="-105" width="240" height="210" rx="30" fill="#fff" fill-opacity="0.96" stroke="#a78bfa" stroke-width="5"/>
      <path d="M-36-23h72v46h-72zm12-22h48v20h-48z" fill="#7c3aed"/>
      <text y="67" fill="#111827" font-size="28" font-weight="700">CI pipeline</text>
      <text y="94" fill="#475569" font-size="17">build + validate</text>
    </g>
    <g transform="translate(800 480)">
      <rect x="-120" y="-105" width="240" height="210" rx="30" fill="#fff" fill-opacity="0.96" stroke="#c4b5fd" stroke-width="5"/>
      <circle cy="-20" r="42" fill="#ef7b4d"/>
      <path d="M-22-20h44M0-42v44" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
      <text y="67" fill="#111827" font-size="28" font-weight="700">Argo CD</text>
      <text y="94" fill="#475569" font-size="17">reconcile</text>
    </g>
    <g transform="translate(1095 480)">
      <rect x="-120" y="-105" width="240" height="210" rx="30" fill="#fff" fill-opacity="0.96" stroke="#93c5fd" stroke-width="5"/>
      <circle cy="-20" r="45" fill="#326ce5"/>
      <path d="M0-53v66M-31-36l62 32M31-36-31-4" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
      <circle cy="-20" r="13" fill="#fff"/>
      <text y="67" fill="#111827" font-size="28" font-weight="700">Kubernetes</text>
      <text y="94" fill="#475569" font-size="17">run + recover</text>
    </g>
    <g transform="translate(1390 480)">
      <rect x="-120" y="-105" width="240" height="210" rx="30" fill="#fff" fill-opacity="0.96" stroke="#f9a8d4" stroke-width="5"/>
      <path d="M-42-10c10-44 74-44 84 0 32 1 36 48 2 54h-88c-34-7-29-53 2-54z" fill="#ff9900"/>
      <text y="67" fill="#111827" font-size="28" font-weight="700">AWS</text>
      <text y="94" fill="#475569" font-size="17">infra + signals</text>
    </g>
  </g>
  <g font-family="system-ui, sans-serif">
    <rect x="110" y="720" width="1380" height="82" rx="24" fill="#fff" fill-opacity="0.1" stroke="#fff" stroke-opacity="0.22"/>
    <text x="150" y="771" fill="#e2e8f0" font-size="24"><tspan font-weight="700" fill="#67e8f9">Automation layers:</tspan> Ansible configuration · Helm packaging · IaC provisioning · logs and monitoring</text>
  </g>
</svg>
